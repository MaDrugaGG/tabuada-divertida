<!DOCTYPE html>
<html>
<body>
<p>Clique nos links abaixo para salvar os icones:</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<a id="link192" download="icon-192.png">Baixar icon-192.png</a><br>
<a id="link512" download="icon-512.png">Baixar icon-512.png</a>
<script>
function drawIcon(canvas, size) {
    const ctx = canvas.getContext('2d');
    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, '#6C63FF');
    grad.addColorStop(1, '#FF6584');

    // Rounded rect
    const r = size * 0.15;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fillStyle = grad;
    ctx.fill();

    // Text
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${size * 0.2}px Arial`;
    ctx.fillText('x', size * 0.5, size * 0.35);
    ctx.font = `bold ${size * 0.35}px Arial`;
    ctx.fillText('123', size * 0.5, size * 0.65);
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

document.getElementById('link192').href = document.getElementById('c192').toDataURL('image/png');
document.getElementById('link512').href = document.getElementById('c512').toDataURL('image/png');
</script>
</body>
</html>
